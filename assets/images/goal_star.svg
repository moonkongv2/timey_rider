<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Goal Star</title>
  <desc>Face-free pastel goal star icon with transparent background for a kids timer app.</desc>

  <defs>
    <radialGradient id="goalStarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEFA6" stop-opacity="0.55"/>
      <stop offset="62%" stop-color="#FFEFA6" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#FFEFA6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goalStarFill" x1="38" y1="22" x2="92" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4A8"/>
      <stop offset="46%" stop-color="#FFD96A"/>
      <stop offset="100%" stop-color="#FFC85A"/>
    </linearGradient>

    <linearGradient id="goalStarHighlight" x1="44" y1="28" x2="74" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Transparent background by default -->

  <!-- Soft non-animated glow. Apply Flutter scale/opacity animation to this whole SVG for pulse. -->
  <circle cx="64" cy="64" r="55" fill="url(#goalStarGlow)"/>
  <circle cx="64" cy="64" r="47" stroke="#FFE58A" stroke-width="2" opacity="0.28"/>
  <circle cx="64" cy="64" r="38" stroke="#FFE58A" stroke-width="2" opacity="0.18"/>

  <!-- Small subtle sparkles -->
  <g opacity="0.88">
    <path d="M24 47C27.4 46.2 29.2 44.4 30 41C30.8 44.4 32.6 46.2 36 47C32.6 47.8 30.8 49.6 30 53C29.2 49.6 27.4 47.8 24 47Z" fill="#FFD84D"/>
    <path d="M96 34C98.6 33.4 100.1 31.9 100.7 29.3C101.3 31.9 102.8 33.4 105.4 34C102.8 34.6 101.3 36.1 100.7 38.7C100.1 36.1 98.6 34.6 96 34Z" fill="#FFD84D"/>
    <path d="M101 86C103.8 85.3 105.3 83.8 106 81C106.7 83.8 108.2 85.3 111 86C108.2 86.7 106.7 88.2 106 91C105.3 88.2 103.8 86.7 101 86Z" fill="#FFD84D"/>
  </g>

  <!-- Rounded five-point star, no face -->
  <path
    d="M64 16
       C66.8 16 69.1 17.7 70.3 20.2
       L81.8 44.2
       C82.8 46.2 84.7 47.6 86.9 47.9
       L113.2 51.4
       C116 51.8 118.3 53.7 119.1 56.4
       C120 59.1 119.2 62 117.1 63.9
