       C101.3 116.9 100.1 119.6 97.8 121.3
       C95.5 123 92.5 123.2 90 121.8
       L67.5 109.1
       C65.3 107.9 62.7 107.9 60.5 109.1
       L38 121.8
       C35.5 123.2 32.5 123 30.2 121.3
       C27.9 119.6 26.7 116.9 27.2 114.1
       L32.1 88
       C32.5 85.8 31.8 83.5 30.2 82
       L10.9 63.9
       C8.8 62 8 59.1 8.9 56.4
       C9.7 53.7 12 51.8 14.8 51.4
       L41.1 47.9
       C43.3 47.6 45.2 46.2 46.2 44.2
       L57.7 20.2
       C58.9 17.7 61.2 16 64 16Z"
    fill="url(#goalStarFill)"
    stroke="#F3B64C"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Soft highlight, clipped visually inside upper-left part -->
  <path
    d="M62.3 28.3
       C63.1 26.7 65.4 26.8 66.1 28.5
       L75.6 49.5
       C76.2 50.8 77.4 51.7 78.8 51.9
       L100.8 55
       C102.6 55.3 103.2 57.5 101.9 58.7
       L84.9 74.5
       C83.9 75.5 83.4 76.9 83.7 78.3
       L87.7 100.4
